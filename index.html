  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

orm: translateY(6px);\n      transition: all 0.2s; pointer-events: none; z-index: 10;\n    }\n    .kpi:hover .kpi-tip { opacity: 1; transform: translateY(0); }\n\n    .hero-bottom {\n      padding: 28px 0;\n      border-top: 1px solid var(--border);\n      display: flex; align-items: center; justify-content: space-between;\n      gap: 20px; flex-wrap: wrap;\n      position: relative; z-index: 2;\n\n    }\n    .hero-roles {\n      display: flex; gap: 6px; flex-wrap: wrap;\n    }\n    .role-badge {\n      padding: 5px 12px;\n      border: 1px solid var(--border2); border-radius: 1px;\n      font-family: var(--fm); font-size: 9px; color: var(--muted2);\n      letter-spacing: 0.09em; text-transform: uppercase;\n      transition: all 0.2s; cursor: default;\n    }\n    .role-badge:hover { border-color: var(--acid); color: var(--acid); }\n    .hero-scroll {\n      font-family: var(--fm); font-size: 9px; color: var(--muted);\n      letter-spacing: 0.15em; text-transform: uppercase;\n      display: flex; align-items: center; gap: 10px;\n      animation: scroll-hint 2s ease-in-out 2s infinite;\n    }\n    .hero-scroll::after { content: ''; display: block; width: 1px; height: 36px; background: var(--muted); animation: scroll-line 2s ease-in-out 2s infinite; }\n    @keyframes scroll-hint { 0%,100%{opacity:0.4} 50%{opacity:1} }\n    @keyframes scroll-line { 0%{height:36px;opacity:0.4} 50%{height:48px;opacity:0.8} 100%{height:36px;opacity:0.4} }\n\n    @keyframes slideIn {\n      from { opacity: 0; transform: translateY(10px); }\n      to { opacity: 1; transform: translateY(0); }\n    }\n\n    /* ═══ SECTIONS ═══ */\n    section { padding: clamp(48px, 8vw, 100px) clamp(20px, 5vw, 64px); }\n\n    .sec-header {\n      display: flex; align-items: baseline; gap: 16px;\n      margin-bottom: clamp(32px, 5vw, 56px);\n      border-bottom: 1px solid var(--border);\n      padding-bottom: 16px;\n    }\n    .sec-num {\n      font-family: var(--fm); font-size: 10px; color: var(--acid);\n inkText, linkHtml);\n  }\n  document.getElementById('ptags2').innerHTML = p.tags.map(function(t) { return '<span class=\"mtag\">'+t+'<\u002Fspan>'; }).join('');\n  det.classList.remove('show');\n  void det.offsetWidth;\n  det.classList.add('show');\n});\n\n/* ── ROLE FILTER ── */\ndocument.getElementById('roleFilter').addEventListener('click', function(e) {\n  var btn = e.target.closest('[data-role]');\n  if (!btn) return;\n  this.querySelectorAll('[data-role]').forEach(function(b) { b.classList.remove('on'); });\n  btn.classList.add('on');\n  var role = btn.dataset.role;\n  document.querySelectorAll('.skill-card').forEach(function(card) {\n    var roles = card.dataset.roles || '';\n    card.style.opacity = (role === 'all' || roles.includes(role)) ? '1' : '0.15';\n    card.style.filter = (role === 'all' || roles.includes(role)) ? 'none' : 'grayscale(1)';\n  });\n});\n\n/* ── SKILL BARS ── */\nvar barsAnimated = false;\nnew IntersectionObserver(function(entries) {\n  if (entries[0].isIntersecting && !barsAnimated) {\n    barsAnimated = true;\n    document.querySelectorAll('.skill-bar').forEach(function(b) { b.style.transform = 'scaleX(1)'; });\n  }\n}, { threshold: 0.2 }).observe(document.getElementById('skillGrid'));\n\n/* ── SCROLL REVEAL ── */\nnew IntersectionObserver(function(entries) {\n  entries.forEach(function(e) {\n    if (e.isIntersecting) { e.target.classList.add('in'); }\n  });\n}, { threshold: 0.07 }).observe(document.body);\n\nvar ro = new IntersectionObserver(function(entries) {\n  entries.forEach(function(e) {\n    if (e.isIntersecting) { e.target.classList.add('in'); ro.unobserve(e.target); }\n  });\n}, { threshold: 0.07 });\ndocument.querySelectorAll('.reveal').forEach(function(el) { ro.observe(el); });\n\n/* ── BUBBLES ── */\n(function() {\n  var canvas = document.getElementById('bcanvas');\n  if (!canvas) return;\n  var ctx = canvas.getContext('2d');\n  var METHODS = [\n    'Agile / Scrum','PMBOK','Kanban','Product Roadmap','Backlog Grooming',\n    'Story Mapping','CJM','JTBD','CUSTDEV','SWOT','KANO / MoSCoW','RAT',\n    'MVP','Unit-экономика','BPMN / UML','Стейкхолдер-мнмт','Риск-менеджмент',\n    'Wireframe / Mockup','A/B-тест','Ретроспективы','Check-листы','SLA','DRP / Backup'\n  ];\n  var W, H, bubbles = [], raf;\n  function resize() { W = canvas.offsetWidth; H = canvas.offsetHeight; canvas.width = W; canvas.height = H; }\n  function makeBubble(i) {\n    var r = 34 + Math.random() * 22;\n    var col = ['acid','ice','white'][Math.floor(Math.random() * 3)];\n    return { text: METHODS[i % METHODS.length], r, x: r + Math.random()*(W-r*2), y: H + r + Math.random()*H*0.6, vy: -(0.18 + Math.random()*0.22), vx: (Math.random()-0.5)*0.14, op: 0.6+Math.random()*0.35, phase: Math.random()*Math.PI*2, col };\n  }\n  function init() {\n    resize();\n    bubbles = METHODS.map(function(_, i) { return makeBubble(i); });\n    bubbles.forEach(function(b, i) { b.y = H - (i/bubbles.length)*H*1.3 - b.r; });\n  }\n  function drawBubble(b) {\n    b.phase += 0.004; b.x += b.vx + Math.sin(b.phase)*0.3; b.y += b.vy;\n    if (b.x - b.r < 0) { b.x = b.r; b.vx = Math.abs(b.vx); }\n    if (b.x + b.r > W) { b.x = W - b.r; b.vx = -Math.abs(b.vx); }\n    if (b.y + b.r < 0) { b.x = b.r + Math.random()*(W-b.r*2); b.y = H + b.r + Math.random()*40; }\n    ctx.save();\n    ctx.globalAlpha = b.op;\n    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);\n    var g = ctx.createRadialGradient(b.x-b.r*0.3, b.y-b.r*0.3, b.r*0.1, b.x, b.y, b.r);\n    if (b.col==='acid') { g.addColorStop(0,'rgba(200,255,0,0.15)'); g.addColorStop(1,'rgba(200,255,0,0.02)'); ctx.strokeStyle='rgba(200,255,0,0.28)'; }\n    else if (b.col==='ice') { g.addColorStop(0,'rgba(0,207,255,0.13)'); g.addColorStop(1,'rgba(0,207,255,0.01)'); ctx.strokeStyle='rgba(0,207,255,0.24)'; }\n    else { g.addColorStop(0,'rgba(255,255,255,0.06)'); g.addColorStop(1,'rgba(255,255,255,0.01)'); ctx.strokeStyle='rgba(255,255,255,0.07)'; }\n    ctx.fillStyle = g; ctx.fill(); ctx.lineWidth = 1; ctx.stroke(); ctx.restore();\n    ctx.save(); ctx.globalAlpha = b.op;\n    var fs = Math.max(9, b.r*0.36);\n    ctx.font = fs+\"px 'DM Mono', monospace\";\n    ctx.textAlign='center'; ctx.textBaseline='middle';\n    ctx.fillStyle = b.col==='acid' ? '#c8ff00' : b.col==='ice' ? '#00cfff' : 'rgba(232,232,240,0.75)';\n    var parts = b.text.split(' / ');\n    if (parts.length > 1 && b.r > 42) {\n      var lh = fs*1.3;\n      parts.forEach(function(part, pi) { ctx.fillText(part, b.x, b.y+(pi-(parts.length-1)/2)*lh); });\n    } else { ctx.fillText(b.text, b.x, b.y); }\n    ctx.restore();\n  }\n  function loop() { ctx.clearRect(0,0,W,H); bubbles.forEach(drawBubble); raf = requestAnimationFrame(loop); }\n  new IntersectionObserver(function(entries) {\n    entries.forEach(function(e) { if (e.isIntersecting) { if(!raf) loop(); } else { cancelAnimationFrame(raf); raf=null; } });\n  }, { threshold: 0.01 }).observe(canvas);\n  init();\n  var t; window.addEventListener('resize', function() { clearTimeout(t); t=setTimeout(function(){ cancelAnimationFrame(raf); raf=null; init(); loop(); }, 200); });\n})();\n\n/* ── MOBILE AUTO-SCROLL EXPERIENCE CARDS ── */\n(function() {\n  var track = document.getElementById('expTrack');\n  if (!track) return;\n  var autoScrollDone = false;\n  var triggered = false;\n\n  function isMobile() { return window.innerWidth <= 768; }\n\n  function autoScroll() {\n    if (!isMobile() || autoScrollDone || triggered) return;\n    triggered = true;\n    var cards = track.querySelectorAll('.exp-card');\n    if (!cards.length) return;\n    var cardW = cards[0].offsetWidth + 2;\n    var total = cards.length;\n    var current = 0;\n\n    function scrollToNext() {\n      current++;\n      if (current >= total) {\n        autoScrollDone = true;\n        return;\n      }\n      var target = cardW * current;\n      var start = track.scrollLeft;\n      var startTime = null;\n      var duration = 1100;\n\n      function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }\n      function step(ts) {\n        if (!startTime) startTime = ts;\n        var p = Math.min((ts - startTime) / duration, 1);\n        track.scrollLeft = start + (target - start) * ease(p);\n        if (p < 1) requestAnimationFrame(step);\n        else setTimeout(scrollToNext, 1800);\n      }\n      requestAnimationFrame(step);\n    }\n\n    setTimeout(scrollToNext, 1600);\n  }\n\n  // Trigger when exp section enters viewport\n  var obs = new IntersectionObserver(function(entries) {\n    if (entries[0].isIntersecting) {\n      autoScroll();\n      obs.disconnect();\n    }\n  }, { threshold: 0.4 });\n  var expSection = track.closest('section') || track.parentElement;\n  if (expSection) obs.observe(expSection);\n})();\n<\u002Fscript>\n\n<script>\n/* ── VANILLA TWEAKS PANEL ── */\n(function() {\n  var DEFAULTS = {\n    accentColor: '#c8ff00',\n    iceColor: '#00cfff',\n    bgDark: true,\n    fontSize: 17,\n    showCursor: true\n  };\n  var state = Object.assign({}, DEFAULTS);\n\n  function applyTweaks() {\n    document.documentElement.style.setProperty('--acid', state.accentColor);\n    document.documentElement.style.setProperty('--ice', state.iceColor);\n    document.documentElement.style.setProperty('--bg', state.bgDark ? '#07070f' : '#0f0f1e');\n    document.documentElement.style.setProperty('--bg2', state.bgDark ? '#0d0d1a' : '#141425');\n    document.body.style.fontSize = state.fontSize + 'px';\n    var cur = document.getElementById('cursor');\n    var ring = document.getElementById('cursor-ring');\n    if (cur) cur.style.display = state.showCursor ? 'block' : 'none';\n    if (ring) ring.style.display = state.showCursor ? 'block' : 'none';\n  }\n\n  function createPanel() {\n    var panel = document.createElement('div');\n    panel.id = 'tweaks-panel';\n    panel.style.cssText = 'position:fixed;bottom:60px;right:16px;z-index:9000;background:#111120;border:1px solid rgba(255,255,255,0.12);padding:20px;width:240px;font-family:\"DM Mono\",monospace;font-size:11px;color:#e8e8f0;display:none;border-radius:2px;box-shadow:0 8px 32px rgba(0,0,0,0.6)';\n\n    panel.innerHTML = '<div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px\"><span style=\"font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:#c8ff00\">Tweaks<\u002Fspan><button id=\"tweaks-close\" style=\"background:none;border:none;color:#5a5a78;cursor:pointer;font-size:16px;line-height:1;padding:0\">×<\u002Fbutton><\u002Fdiv>'\n      + row('Акцент (кислота)', '<input type=\"color\" id=\"tw-accent\" value=\"'+state.accentColor+'\" style=\"width:36px;height:24px;border:none;background:none;cursor:pointer;padding:0\">')\n      + row('Акцент (лёд)', '<input type=\"color\" id=\"tw-ice\" value=\"'+state.iceColor+'\" style=\"width:36px;height:24px;border:none;background:none;cursor:pointer;padding:0\">')\n      + row('Тёмный фон', '<label style=\"cursor:pointer;display:flex;align-items:center;gap:6px\"><input type=\"checkbox\" id=\"tw-dark\"'+(state.bgDark?' checked':'')+' style=\"accent-color:#c8ff00;width:14px;height:14px\"><\u002Flabel>')\n      + row('Размер шрифта', '<input type=\"range\" id=\"tw-size\" min=\"14\" max=\"20\" step=\"1\" value=\"'+state.fontSize+'\" style=\"width:80px;accent-color:#c8ff00\">')\n      + row('Курсор', '<label style=\"cursor:pointer;display:flex;align-items:center;gap:6px\"><input type=\"checkbox\" id=\"tw-cursor\"'+(state.showCursor?' checked':'')+' style=\"accent-color:#c8ff00;width:14px;height:14px\"><\u002Flabel>');\n\n    document.body.appendChild(panel);\n\n    document.getElementById('tweaks-close').addEventListener('click', function() {\n      panel.style.display = 'none';\n      window.parent.postMessage({type:'__edit_mode_dismissed'},'*');\n    });\n    document.getElementById('tw-accent').addEventListener('input', function() {\n      state.accentColor = this.value; applyTweaks();\n      window.parent.postMessage({type:'__edit_mode_set_keys', edits:{accentColor:this.value}},'*');\n    });\n    document.getElementById('tw-ice').addEventListener('input', function() {\n      state.iceColor = this.value; applyTweaks();\n      window.parent.postMessage({type:'__edit_mode_set_keys', edits:{iceColor:this.value}},'*');\n    });\n    document.getElementById('tw-dark').addEventListener('change', function() {\n      state.bgDark = this.checked; applyTweaks();\n      window.parent.postMessage({type:'__edit_mode_set_keys', edits:{bgDark:this.checked}},'*');\n    });\n    document.getElementById('tw-size').addEventListener('input', function() {\n      state.fontSize = +this.value; applyTweaks();\n      window.parent.postMessage({type:'__edit_mode_set_keys', edits:{fontSize:+this.value}},'*');\n    });\n    document.getElementById('tw-cursor').addEventListener('change', function() {\n      state.showCursor = this.checked; applyTweaks();\n      window.parent.postMessage({type:'__edit_mode_set_keys', edits:{showCursor:this.checked}},'*');\n    });\n    return panel;\n  }\n\n  function row(label, control) {\n    return '<div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:12px\"><span style=\"color:#8888aa;font-size:10px\">'+label+'<\u002Fspan>'+control+'<\u002Fdiv>';\n  }\n\n  var panel;\n  window.addEventListener('message', function(e) {\n    if (e.data && e.data.type === '__activate_edit_mode') {\n      if (!panel) panel = createPanel();\n      panel.style.display = 'block';\n    }\n    if (e.data && e.data.type === '__deactivate_edit_mode') {\n      if (panel) panel.style.display = 'none';\n    }\n  });\n  window.parent.postMessage({type:'__edit_mode_available'},'*');\n  applyTweaks();\n})();\n<\u002Fscript>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
